schema: spec-driven

context: |
  ExFix: Elixir implementation of the FIX Session protocol (FIXT.1.1).
  Buy-side session initiator for financial trading systems.

  Tech stack:
  - Elixir 1.18+, OTP (GenServer, DynamicSupervisor, ETS)
  - Zero runtime dependencies (only Erlang/OTP primitives)
  - Dev tools: ExDoc, Dialyxir, Credo, Benchfella

  Architecture:
  - OTP supervision tree with one GenServer per session
  - Extension points via behaviours (SessionHandler, Dictionary, SessionRegistry)
  - Two-phase message parsing (metadata extraction → complete parsing)
  - Binary protocol: tag=value pairs with SOH delimiters

  Conventions:
  - All public functions have @doc, @spec, and @moduledoc
  - Immutable structs with enforce_keys for required fields
  - Pluggable components via behaviours (not protocols)
  - Performance-critical paths use @compile {:inline, ...}
  - Tests use mock transports and registries (no network I/O)

  Domain:
  - FIX messages: Logon, Heartbeat, TestRequest, Reject, SequenceReset, Logout
  - Session management: sequence numbers, heartbeat monitoring, reconnection
  - Message validation: checksum, body length, sending time tolerance

  Code and commit language: English
  OpenSpec artifact language: English

rules:
  proposal:
    - Consider backwards compatibility — this is a library published on hex.pm
    - Identify impact on existing behaviours (SessionHandler, Dictionary, SessionRegistry)
    - Note if the change affects FIX protocol conformance
  specs:
    - Use Given/When/Then format for scenarios
    - Include error cases and edge cases (malformed messages, sequence gaps, disconnections)
    - Reference the FIX protocol spec where applicable
  design:
    - Prefer extending existing behaviours over creating new ones
    - Document OTP process interactions with diagrams
    - Consider performance implications (parsing is in the hot path)
  tasks:
    - Each task should be completable in less than 2 hours
    - Include test tasks alongside implementation tasks
    - Specify which modules/files are affected
