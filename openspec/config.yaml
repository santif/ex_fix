schema: spec-driven

context: |
  ExFix: implementación en Elixir del protocolo FIX Session (FIXT.1.1).
  Iniciador de sesión buy-side para sistemas de trading financiero.

  Stack técnico:
  - Elixir 1.18+, OTP (GenServer, DynamicSupervisor, ETS)
  - Cero dependencias en runtime (solo primitivas Erlang/OTP)
  - Herramientas dev: ExDoc, Dialyxir, Credo, Benchfella

  Arquitectura:
  - Árbol de supervisión OTP con un GenServer por sesión
  - Puntos de extensión via behaviours (SessionHandler, Dictionary, SessionRegistry)
  - Parsing de mensajes en dos fases (extracción de metadata → parsing completo)
  - Protocolo binario: pares tag=value con delimitadores SOH

  Convenciones:
  - Todas las funciones públicas tienen @doc, @spec y @moduledoc
  - Structs inmutables con enforce_keys para campos requeridos
  - Componentes pluggables via behaviours (no protocols)
  - Paths críticos de performance usan @compile {:inline, ...}
  - Tests usan mock transports y registries (sin I/O de red)

  Dominio:
  - Mensajes FIX: Logon, Heartbeat, TestRequest, Reject, SequenceReset, Logout
  - Gestión de sesión: números de secuencia, monitoreo de heartbeat, reconexión
  - Validación de mensajes: checksum, body length, tolerancia de sending time

  Idioma del código y commits: inglés
  Idioma de artefactos OpenSpec: español

rules:
  proposal:
    - Considerar compatibilidad hacia atrás — es una librería publicada en hex.pm
    - Identificar impacto en behaviours existentes (SessionHandler, Dictionary, SessionRegistry)
    - Notar si el cambio afecta la conformidad con el protocolo FIX
  specs:
    - Usar formato Dado/Cuando/Entonces para escenarios
    - Incluir casos de error y edge cases (mensajes malformados, gaps de secuencia, desconexiones)
    - Referenciar la spec del protocolo FIX donde corresponda
  design:
    - Preferir extender behaviours existentes antes que crear nuevos
    - Documentar interacciones entre procesos OTP con diagramas
    - Considerar implicaciones de performance (el parsing está en el hot path)
  tasks:
    - Cada tarea debe ser completable en menos de 2 horas
    - Incluir tareas de test junto a las de implementación
    - Especificar qué módulos/archivos se ven afectados
