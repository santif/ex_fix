name: lightweight
version: 1
description: "Flujo ligero para fixes, refactors y mejoras menores: proposal → tasks"
artifacts:
  - id: proposal
    generates: proposal.md
    description: Descripción concisa del cambio, motivación y alcance
    template: proposal.md
    instruction: |
      Crear un proposal breve y directo. Sin specs ni diseño — esto es para
      cambios pequeños o medianos donde la implementación es clara.

      Secciones:
      - **Por qué**: 1-2 oraciones sobre el problema u oportunidad.
      - **Qué cambia**: Lista de cambios concretos. Marcar breaking changes con **BREAKING**.
      - **Impacto**: Código, APIs, dependencias o sistemas afectados.

      Mantenerlo en menos de media página. Si el cambio necesita specs o
      diseño detallado, probablemente debería usar el schema spec-driven.
    requires: []

  - id: tasks
    generates: tasks.md
    description: Checklist de implementación con tareas rastreables
    template: tasks.md
    instruction: |
      Crear la lista de tareas para implementar el cambio.

      Formato:
      - Cada tarea DEBE ser un checkbox: `- [ ] N. Descripción`
      - Tareas pequeñas, completables en una sesión
      - Ordenar por dependencia (qué se hace primero)
      - Incluir tareas de test junto a las de implementación
      - Especificar qué módulos/archivos se ven afectados

      Ejemplo:
      ```
      ## Tareas

      - [ ] 1. Agregar campo `timeout` a `SessionConfig` (`lib/ex_fix/session_config.ex`)
      - [ ] 2. Usar `timeout` en `SessionWorker.handle_info/2` (`lib/ex_fix/session_worker.ex`)
      - [ ] 3. Agregar tests para timeout configurable (`test/session_worker_test.exs`)
      ```

      Referenciar el proposal para contexto.
    requires:
      - proposal
apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Leer el proposal para contexto, trabajar las tareas pendientes,
    marcar como completadas a medida que se avanza.
    Pausar si hay blockers o se necesita clarificación.
