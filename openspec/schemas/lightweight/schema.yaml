name: lightweight
version: 1
description: "Lightweight flow for fixes, refactors, and minor improvements: proposal → tasks"
artifacts:
  - id: proposal
    generates: proposal.md
    description: Concise description of the change, motivation, and scope
    template: proposal.md
    instruction: |
      Create a brief and direct proposal. No specs or design — this is for
      small to medium changes where the implementation is clear.

      Sections:
      - **Why**: 1-2 sentences about the problem or opportunity.
      - **What changes**: List of concrete changes. Mark breaking changes with **BREAKING**.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      Keep it under half a page. If the change needs specs or
      detailed design, it should probably use the spec-driven schema.
    requires: []

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list to implement the change.

      Format:
      - Each task MUST be a checkbox: `- [ ] N. Description`
      - Small tasks, completable in a single session
      - Order by dependency (what comes first)
      - Include test tasks alongside implementation tasks
      - Specify which modules/files are affected

      Example:
      ```
      ## Tasks

      - [ ] 1. Add `timeout` field to `SessionConfig` (`lib/ex_fix/session_config.ex`)
      - [ ] 2. Use `timeout` in `SessionWorker.handle_info/2` (`lib/ex_fix/session_worker.ex`)
      - [ ] 3. Add tests for configurable timeout (`test/session_worker_test.exs`)
      ```

      Reference the proposal for context.
    requires:
      - proposal
apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Read the proposal for context, work through pending tasks,
    mark as completed as you progress.
    Pause if there are blockers or clarification is needed.
